name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 portaudio19-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Lint / type-check / coverage tooling
          pip install ruff mypy pytest-cov

      - name: Static analysis (ruff)
        run: ruff check backend local_client shared || true

      - name: Compile all modules
        run: python -m compileall -q backend local_client shared

      - name: Type-check (best-effort, non-blocking)
        run: mypy backend shared --ignore-missing-imports || true

      - name: Run tests with coverage
        run: |
          python -m pytest backend/tests/ \
            --cov=backend \
            --cov=shared \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Enforce minimum coverage (best-effort)
        run: |
          # Best-effort gate — don't fail the build if a few new files lack coverage,
          # but report the number so it's visible in CI logs.
          python -m pytest backend/tests/ --cov=backend --cov=shared --cov-report=term --cov-fail-under=40 -q --no-header || true

