name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes

      - name: Static analysis (undefined names)
        run: |
          # Fail the build on real errors (undefined names, syntax); ignore style-only warnings.
          set +e
          OUT=$(python -m pyflakes backend local_client shared)
          echo "$OUT"
          echo "$OUT" | grep -E "undefined name|invalid syntax" && { echo "Found undefined names"; exit 1; }
          echo "No undefined-name errors"
          exit 0

      - name: Compile all modules
        run: python -m compileall -q backend local_client shared

      - name: Run tests
        run: python -m pytest backend/tests/ -v
